name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  validate:
    name: Validate Tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check tag matches VERSION
        run: |
          VERSION=$(cat VERSION)
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "VERSION file: $VERSION"
          echo "Git tag:      $TAG"
          if [ "$VERSION" != "$TAG" ]; then
            echo "ERROR: VERSION file ($VERSION) does not match git tag (v$TAG)"
            exit 1
          fi
          if echo "$VERSION" | grep -q '\-dev'; then
            echo "ERROR: VERSION '$VERSION' is a dev version. Releases must use stable versions."
            exit 1
          fi
          echo "OK: VERSION matches tag."

  build-wasm:
    name: Build WASM (trunk)
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install trunk
        run: cargo install trunk
      - name: Build WASM frontend
        run: cd sp-ui && trunk build --release
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  build-tauri:
    name: Build Tauri (Windows)
    runs-on: windows-latest
    needs: [build-wasm]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Install Tauri CLI
        run: cargo install tauri-cli
      - name: Build Tauri app
        run: cargo tauri build
      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: tauri-installer
          path: src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 5

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-tauri]
    steps:
      - uses: actions/checkout@v4
      - name: Download NSIS installer
        uses: actions/download-artifact@v4
        with:
          name: tauri-installer
          path: installer/
      - name: Read VERSION
        id: version
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "SongPlayer v${{ steps.version.outputs.version }}"
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: installer/*.exe

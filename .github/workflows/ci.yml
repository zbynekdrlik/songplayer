name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  version-check:
    name: Version Check (PR must not be dev)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Check VERSION does not contain -dev
        run: |
          VERSION=$(cat VERSION)
          echo "VERSION=$VERSION"
          if echo "$VERSION" | grep -q '\-dev'; then
            echo "ERROR: VERSION '$VERSION' contains '-dev'. Remove the dev suffix before merging to main."
            exit 1
          fi
          echo "OK: VERSION '$VERSION' is a release version."

  dev-version-check:
    name: Dev Version Check (push to dev must be dev version)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    steps:
      - uses: actions/checkout@v4
      - name: Check VERSION contains -dev
        run: |
          VERSION=$(cat VERSION)
          echo "VERSION=$VERSION"
          if ! echo "$VERSION" | grep -q '\-dev'; then
            echo "ERROR: VERSION '$VERSION' does not contain '-dev'. Dev branch must use a dev version (e.g. 0.1.0-dev.1)."
            exit 1
          fi
          echo "OK: VERSION '$VERSION' is a dev version."

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt,clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --workspace --verbose

  test-wasm:
    name: Test WASM (sp-core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Check WASM target
        run: cargo check --target wasm32-unknown-unknown -p sp-core

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Run security audit
        run: cargo audit --ignore RUSTSEC-2023-0071  # rsa crate via sqlx-mysql (transitive, we only use sqlite)

  build-wasm:
    name: Build WASM (trunk)
    runs-on: ubuntu-latest
    needs: [lint, test-wasm]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install trunk
        run: cargo install trunk
      - name: Build WASM frontend
        run: cd sp-ui && trunk build --release
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  build-tauri:
    name: Build Tauri (Windows)
    runs-on: windows-latest
    needs: [build-wasm]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Install Tauri CLI
        run: cargo install tauri-cli
      - name: Build Tauri app
        run: cargo tauri build
      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: tauri-installer
          path: src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 5

  frontend-e2e:
    name: Frontend E2E Tests
    runs-on: ubuntu-latest
    needs: [build-wasm]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Install E2E dependencies
        run: cd e2e && npm ci
      - name: Install Playwright browsers
        run: cd e2e && npx playwright install chromium --with-deps
      - name: Start mock API
        run: cd e2e && node mock-api.mjs &
      - name: Wait for mock API
        run: |
          for i in $(seq 1 15); do
            if curl -s http://127.0.0.1:8920/api/v1/status > /dev/null 2>&1; then
              echo "Mock API is ready"
              exit 0
            fi
            sleep 1
          done
          echo "Mock API failed to start"
          exit 1
      - name: Run Playwright tests
        run: cd e2e && npx playwright test
      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 5

  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build workspace
        run: cargo build --workspace
      - name: Run tests
        run: cargo test --workspace --verbose

  gate:
    name: Gate
    runs-on: ubuntu-latest
    if: always()
    needs:
      - version-check
      - dev-version-check
      - lint
      - test
      - test-wasm
      - security
      - build-windows
      - build-wasm
      - build-tauri
      - frontend-e2e
    steps:
      - name: Check all jobs passed
        run: |
          results='${{ toJSON(needs) }}'
          echo "Job results: $results"
          # version-check and dev-version-check are conditional — skipped is acceptable
          for job in lint test test-wasm security build-windows build-wasm build-tauri frontend-e2e; do
            result=$(echo "$results" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['$job']['result'])")
            echo "$job: $result"
            if [ "$result" != "success" ]; then
              echo "FAILED: job '$job' did not succeed (result: $result)"
              exit 1
            fi
          done
          echo "All required jobs passed."
